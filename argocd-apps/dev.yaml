# ==========================================================
# 1. BASE CONFIG (ConfigMap & Secret)
# ==========================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: foodhub-dev-base
  namespace: argocd
  labels:
    env: dev
spec:
  project: default
  source:
    repoURL: https://github.com/NgHVu/Foodhub-Config.git
    targetRevision: main
    path: environments/dev/base-config/
    directory:
      recurse: false
      include: '*.yaml' 
      exclude: '*-values.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: foodhub-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# ==========================================================
# 2. USERS SERVICE
# ==========================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: foodhub-dev-users
  namespace: argocd
  labels:
    env: dev
spec:
  project: default
  source:
    repoURL: https://github.com/NgHVu/Foodhub-Config.git 
    targetRevision: main
    path: helm/foodhub-chart
    helm:
      valueFiles:
        - ../../environments/dev/users-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: foodhub-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

